<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists</title>
</head>
<body>
<h1>Artists</h1>

<nav>
    <a th:href="@{/artists}">Artists</a>
    <a th:href="@{/albums}">Albums</a>
    <a th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
        <button type="submit">Logout</button>
    </form>
</nav>

<p sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/artists/new}">Add Artist</a>
</p>

<form th:action="@{/artists}" method="get">
    <label for="artist-search">Search artists</label>
    <input id="artist-search" type="text" name="query" th:value="${query}">
    <button type="submit">Search</button>
    <a th:href="@{/artists}">Clear</a>
</form>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="artist : ${artists}">
        <td>
            <a th:href="@{/artist/{id}(id=${artist.id})}" th:text="${artist.name}">Artist Name</a>
        </td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/artist/{id}/edit(id=${artist.id})}">Edit</a>
            <form th:action="@{/artist/{id}/delete(id=${artist.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(artists)}">
        <td sec:authorize="hasRole('ADMIN')" colspan="2">No artists found.</td>
        <td sec:authorize="!hasRole('ADMIN')">No artists found.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
