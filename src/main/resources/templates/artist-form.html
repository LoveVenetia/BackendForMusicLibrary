<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Form</title>
</head>
<body>
<h1 th:text="${artist.id == null} ? 'Add Artist' : 'Edit Artist'">Artist Form</h1>

<nav>
    <a th:href="@{/artists}">Artists</a>
    <a th:href="@{/albums}">Albums</a>
    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
        <button type="submit">Logout</button>
    </form>
</nav>

<form th:action="${artist.id == null} ? @{/artists} : @{/artist/{id}(id=${artist.id})}" th:object="${artist}" method="post">
    <div>
        <label for="name">Name</label>
        <input id="name" type="text" th:field="*{name}">
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</p>
    </div>
    <div>
        <button type="submit">Save</button>
    </div>
</form>
</body>
</html>
