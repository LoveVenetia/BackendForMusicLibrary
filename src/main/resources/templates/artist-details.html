<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Details</title>
</head>
<body>
<h1 th:text="${artist.name}">Artist Name</h1>

<nav>
    <a th:href="@{/artists}">Artists</a>
    <a th:href="@{/albums}">Albums</a>
    <a th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
        <button type="submit">Logout</button>
    </form>
</nav>

<p sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/artist/{id}/edit(id=${artist.id})}">Edit Artist</a>
</p>

<h2>Albums</h2>
<table>
    <thead>
    <tr>
        <th>Title</th>
        <th>Release Year</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="album : ${artist.albums}">
        <td th:text="${album.title}">Album Title</td>
        <td th:text="${album.releaseYear}">2000</td>
    </tr>
    <tr th:if="${#lists.isEmpty(artist.albums)}">
        <td colspan="2">No albums found for this artist.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
